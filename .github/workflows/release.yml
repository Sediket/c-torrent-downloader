name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libtorrent-rasterbar-dev cmake build-essential

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-dl-linux
          path: build/torrent-dl

  build-windows:
    name: Build (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install libtorrent via vcpkg
        run: |
          vcpkg install libtorrent:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-dl-windows
          path: build\Release\torrent-dl.exe

  release:
    name: Publish Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: torrent-dl-linux
          path: dist/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: torrent-dl-windows
          path: dist/windows

      - name: Make Linux binary executable
        run: chmod +x dist/linux/torrent-dl

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/torrent-dl
            dist/windows/torrent-dl.exe
          generate_release_notes: true
